# Workflow to build and deploy a Next.js static export site to GitHub Pages.
name: Deploy to GitHub Pages

on:
  # Trigger the deployment on every push to the main branch
  push:
    branches: [main]

  # Allow manual triggering of this workflow from the GitHub Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, preventing overlapping or outdated runs from deploying
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Caches npm dependencies to speed up future runs
          cache: "npm"

      # Step 3: Configure GitHub Pages runner environment variables
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 4: Install dependencies using package-lock.json for deterministic builds
      - name: Install dependencies
        run: npm ci

      # Step 5: Build static pages using Next.js (generates the 'out' directory)
      - name: Build with Next.js
        run: npm run build

      # Step 6: Verify the output directory exists
      - name: Verify build output
        run: |
          ls -la
          ls -la out

      # Step 7: Upload the generated static 'out' directory as a deployment artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Step 7: Deploy the uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
